name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate managed and native modules
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Test active documentation drift lint
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/active-doc-drift-tests/Test-ActiveDocDrift.ps1

      - name: Validate repository (active-doc drift blocking)
        run: ./scripts/validate.ps1

      - name: Preflight private build outputs and dependencies
        shell: pwsh
        run: |
          foreach ($checkLevel in @('namespace', 'dependency')) {
              & pwsh -File scripts/preflight-leak-check.ps1 -CheckLevel $checkLevel
              $exitCode = $LASTEXITCODE
              if ($exitCode -ne 0) {
                  exit $exitCode
              }
          }

      - name: Export public projection and audit source (private repository only)
        if: ${{ hashFiles('scripts/migrate-to-public.ps1') != '' }}
        shell: pwsh
        run: |
          $projectionRoot = Join-Path $env:RUNNER_TEMP 'raya-public-projection'
          & pwsh -File scripts/migrate-to-public.ps1 -Mode Export -TargetDir $projectionRoot
          $exportExitCode = $LASTEXITCODE
          if ($exportExitCode -ne 0) {
              exit $exportExitCode
          }

          $projectionPreflight = Join-Path $projectionRoot 'scripts/preflight-leak-check.ps1'
          & pwsh -File $projectionPreflight -CheckLevel source -TargetDir $projectionRoot
          $auditExitCode = $LASTEXITCODE
          if ($auditExitCode -ne 0) {
              exit $auditExitCode
          }

      - name: Contract consistency lint
        run: dotnet run --project tools/RayaTrainer.ContractLint/RayaTrainer.ContractLint.csproj -c Release -- .

      - name: Validate generated analysis atlas (non-blocking)
        continue-on-error: true
        run: powershell -ExecutionPolicy Bypass -File ./scripts/validate-analysis-index.ps1 -Rebuild
